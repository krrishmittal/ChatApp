<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header {
            background: #4F46E5;
            padding: 30px;
            text-align: center;
        }

            .header h1 {
                color: #ffffff;
                margin: 0;
                font-size: 24px;
            }

        .body {
            padding: 30px;
            color: #333333;
        }

            .body h2 {
                font-size: 20px;
            }

            .body p {
                line-height: 1.6;
            }

        .alert {
            background: #FEF3C7;
            border-left: 4px solid #F59E0B;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 20px 0;
        }

        .footer {
            background: #f4f4f4;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #999999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>New Login Detected 🔐</h1>
        </div>
        <div class="body">
            <h2>Hey {{FULL_NAME}}!</h2>
            <p>We noticed a new login to your ChatApp account.</p>
            <div class="alert">
                <strong>Time:</strong> {{LOGIN_TIME}}<br />
            </div>
            <p>If this was you, no action is needed.</p>
            <p>If you did not log in, please reset your password immediately.</p>
        </div>
        <div class="footer">
            &copy; {{CURRENT_YEAR}} ChatApp. All rights reserved.
        </div>
    </div>
</body>
</html>
