<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header {
            background: #4F46E5;
            padding: 30px;
            text-align: center;
        }

            .header h1 {
                color: #ffffff;
                margin: 0;
                font-size: 24px;
            }

        .body {
            padding: 30px;
            color: #333333;
        }

            .body p {
                line-height: 1.6;
            }

        .otp-box {
            background: #F3F4F6;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

            .otp-box span {
                font-size: 36px;
                font-weight: bold;
                letter-spacing: 8px;
                color: #4F46E5;
            }

        .footer {
            background: #f4f4f4;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #999999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Password Reset OTP 🔑</h1>
        </div>
        <div class="body">
            <p>Hey {{FULL_NAME}},</p>
            <p>Use the OTP below to reset your password. It expires in <strong>{{EXPIRY_MINUTES}} minutes</strong>.</p>
            <div class="otp-box">
                <span>{{OTP_CODE}}</span>
            </div>
            <p>If you did not request this, please ignore this email.</p>
        </div>
        <div class="footer">
            &copy; {{CURRENT_YEAR}} ChatApp. All rights reserved.
        </div>
    </div>
</body>
</html>
